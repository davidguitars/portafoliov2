<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fondo oscuro -->
  <rect width="32" height="32" fill="#0F0F0E"/>
  <!-- Cuadrado lima principal -->
  <rect x="6" y="6" width="20" height="20" fill="#C8FF00"/>
  <!-- Cuadrado interior oscuro — crea el efecto de marco/profundidad -->
  <rect x="11" y="11" width="10" height="10" fill="#0F0F0E"/>
  <!-- Punto central lima -->
  <rect x="14" y="14" width="4" height="4" fill="#C8FF00"/>
</svg>
